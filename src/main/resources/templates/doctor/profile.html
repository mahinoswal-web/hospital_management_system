<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile - MediPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Styles */
        #sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
        }
        #sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        #sidebar .nav-link:hover, #sidebar .nav-link.active {
            background-color: rgba(255,255,255,0.2);
            color: white;
            transform: translateX(5px);
        }

        /* Top Navbar */
        .top-navbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* Profile-specific styles */
        .profile-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 0;
            border-radius: 10px 10px 0 0;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 4px solid white;
            border-radius: 50%;
            margin-top: -60px;
            background-color: #fff;
        }
        .profile-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .fade-in {
          animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="d-flex flex-column p-4" id="sidebar" style="width: 280px;">
        <a href="/doctor/docdashboard" class="d-flex align-items-center mb-4 text-white text-decoration-none">
            <div class="bg-white text-primary rounded-circle p-2 me-3 shadow-sm">
                <img src="https://img.icons8.com/color/48/000000/doctor-male.png" alt="Doctor Logo" width="48" height="48"/>
            </div>
            <span class="fs-4 fw-bold">MediPortal</span>
        </a>
        <hr class="text-white-50">
       <ul class="nav nav-pills flex-column mb-auto mt-2">
            <li>
                <a href="/doctor/docdashboard" class="nav-link px-3 py-2">
                    <i class="bi bi-grid-1x2-fill me-2"></i> Dashboard
                </a>
            </li>
            <li>
                <a href="/doctor/mypatients" class="nav-link px-3 py-2">
                    <i class="bi bi-people-fill me-2"></i> My Patients
                </a>
            </li>
            <li>
                <a href="/doctor/inventory" class="nav-link px-3 py-2">
                    <i class="bi bi-capsule me-2"></i> Medicine Inventory
                </a>
            </li>
            <li>
                <a href="/doctor/profile" class="nav-link active px-3 py-2">
                    <i class="bi bi-person-circle me-2"></i> My Profile
                </a>
            </li>
        </ul>
        <div class="mt-auto">
            <hr class="text-white-50">
            <a href="/login?logout=true" class="btn btn-outline-light w-100 rounded-pill fw-bold mt-2">
                <i class="bi bi-box-arrow-right me-2"></i> Log Out
            </a>
        </div>
    </div>

    <div class="flex-grow-1 fade-in" style="margin-left: 280px;">
        <nav class="navbar top-navbar py-3 px-4 mb-4 sticky-top">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold text-dark">My Profile</h5>
                <div class="d-flex align-items-center">
                    <span class="badge bg-primary rounded-pill px-3 py-2 me-3 shadow-sm fs-6" th:text="${displayId}">DOC-000</span>
                    <div class="bg-light rounded-circle d-flex align-items-center justify-content-center border shadow-sm" style="width: 45px; height: 45px;">
                        <i class="bi bi-person-fill fs-4 text-primary"></i>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 pb-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 col-xl-8">

                    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show rounded shadow-sm fw-bold border-0 mb-4" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i> Profile updated successfully! Your prescriptions will now use these details.
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="profile-card">
                        <div class="profile-header text-center">
                            <h2 class="fw-bold mb-0">Manage Profile</h2>
                            <p class="text-white-50">Manage your clinical and contact details</p>
                        </div>

                        <div class="text-center">
                            <img th:src="@{https://ui-avatars.com/api/(name=${doctor.name},background='e9ecef',color='1e3c72',size=150)}" id="profilePic" class="profile-img shadow-sm" alt="Profile">
                        </div>

                        <div class="p-4 p-md-5">

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold text-dark"><i class="bi bi-person-badge text-primary me-2"></i> Personal Details</h5>
                                <button class="btn btn-sm btn-outline-primary" id="editBtn">
                                    <i class="bi bi-pencil-square"></i> Edit
                                </button>
                            </div>

                            <form th:action="@{/doctor/update-profile}" method="POST" th:object="${doctor}" id="profileForm">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Full Name</label>
                                        <input type="text" th:field="*{name}" id="docName" class="form-control bg-light" readonly required>
                                    </div>
                                    <div class="col-md-6 mt-3 mt-md-0">
                                        <label class="form-label small fw-bold text-muted">Doctor ID</label>
                                        <input type="text" th:field="*{doctorId}" id="docId" class="form-control bg-light" readonly>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Specialization</label>
                                        <input type="text" th:field="*{specialization}" id="docSpecialization" class="form-control bg-light" readonly required>
                                    </div>
                                    <div class="col-md-6 mt-3 mt-md-0">
                                        <label class="form-label small fw-bold text-muted">Qualifications</label>
                                        <input type="text" th:field="*{qualification}" id="docQualification" class="form-control bg-light" placeholder="e.g. MBBS, MD" readonly>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label small fw-bold text-muted">Associated Hospital / Clinic</label>
                                    <input type="text" th:field="*{hospitalName}" id="docHospital" class="form-control bg-light" readonly>
                                </div>

                                <hr class="my-4">
                                <h5 class="fw-bold text-dark mb-4"><i class="bi bi-telephone text-primary me-2"></i> Contact Information</h5>

                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Email Address</label>
                                        <input type="email" th:field="*{email}" id="docEmail" class="form-control bg-light" readonly>
                                    </div>
                                    <div class="col-md-6 mt-3 mt-md-0">
                                        <label class="form-label small fw-bold text-muted">Phone Number</label>
                                        <input type="text" th:field="*{phone}" id="docPhone" class="form-control bg-light" readonly required>
                                    </div>
                                </div>

                                <div class="d-grid d-none" id="saveActionDiv">
                                    <button type="submit" class="btn btn-success btn-lg shadow-sm" id="saveBtn">
                                        <i class="bi bi-check2-circle me-2"></i> Save Changes
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const editBtn = document.getElementById('editBtn');
        const saveActionDiv = document.getElementById('saveActionDiv');
        const inputsToUnlock = document.querySelectorAll('#profileForm input:not(#docId):not(#docEmail)');

        editBtn.addEventListener('click', function(e) {
            e.preventDefault();
            let isReadonly = inputsToUnlock[0].hasAttribute('readonly');
            if(isReadonly) {
                inputsToUnlock.forEach(input => {
                    input.removeAttribute('readonly');
                    input.classList.remove('bg-light');
                });
                editBtn.innerHTML = '<i class="bi bi-x-circle"></i> Cancel';
                editBtn.classList.replace('btn-outline-primary', 'btn-outline-danger');
                saveActionDiv.classList.remove('d-none');
            } else {
                window.location.reload();
            }
        });

        document.getElementById('profileForm').addEventListener('submit', function() {
            const submitBtn = document.getElementById('saveBtn');
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Saving...';
            submitBtn.disabled = true;
        });
    });
</script>

</body>
</html>
