<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Doctor - AdminHQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Preserved your styling, added margin for sidebar */
        body { background-color: #f4f7fa; font-family: 'Segoe UI', sans-serif; margin-left: 280px; }
        .glass-card { background: white; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-primary { background: #3b82f6; border: none; border-radius: 10px; padding: 12px; }
        
        /* Sidebar Styling */
        #sidebar { width: 280px; position: fixed; height: 100vh; left: 0; top: 0; background: #1a1c23; z-index: 1000; }
        .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 5px; }
        .nav-link.active { background: #3b82f6 !important; color: white !important; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

    <div class="d-flex flex-column p-4 text-white" id="sidebar">
        <h4 class="fw-bold mb-4"><i class="bi bi-shield-lock-fill text-primary me-2"></i>AdminHQ</h4>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/admin/dashboard" class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard Overview
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin/doctors" class="nav-link" th:classappend="${activePage == 'manage-doctors' ? 'active' : ''}">
                    <i class="bi bi-person-badge me-2"></i> Manage Doctors
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin/patients" class="nav-link" th:classappend="${activePage == 'manage-patients' ? 'active' : ''}">
                    <i class="bi bi-people me-2"></i> Global Patients
                </a>
            </li>
        </ul>
        <div class="mt-auto">
            <a href="/login?logout=true" class="btn btn-outline-danger w-100 fw-bold">
                <i class="bi bi-box-arrow-right me-2"></i> Log Out
            </a>
        </div>
    </div>

    <div class="container-fluid py-5 px-4">
        <div class="row justify-content-center">
            <div class="col-xl-9">
                <div class="mb-4">
                    <a href="/admin/doctors" class="text-decoration-none text-muted fw-bold">
                        <i class="bi bi-arrow-left me-1"></i> Back to Doctor Registry
                    </a>
                </div>
                <div class="card glass-card p-4 p-md-5">
                    <h2 class="fw-bold text-dark mb-4"><i class="bi bi-person-plus-fill text-primary me-2"></i> Onboard New Physician</h2>
                    
                    <form action="/admin/register-doctor" method="POST" th:object="${doctor}">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Doctor ID</label>
                                <input type="text" class="form-control" th:field="*{doctorId}" placeholder="DOC-102" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Full Name</label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="Dr. Stephen Strange" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Gender</label>
                                <select class="form-select" th:field="*{gender}">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Phone (Username)</label>
                                <input type="text" class="form-control" th:field="*{phone}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Password</label>
                                <input type="text" class="form-control" th:field="*{password}" placeholder="doc123" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Specialization</label>
                                <input type="text" class="form-control" th:field="*{specialization}" placeholder="Neurosurgery">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Experience (Years)</label>
                                <input type="number" class="form-control" th:field="*{experience}">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold small">Qualification</label>
                                <input type="text" class="form-control" th:field="*{qualification}" placeholder="MBBS, MS, PhD">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Hospital Name</label>
                                <input type="text" class="form-control" th:field="*{hospitalName}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small">Consultation Fee (₹)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{consultationFee}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small">Rating</label>
                                <input type="number" step="0.1" class="form-control" th:field="*{rating}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Availability</label>
                                <input type="text" class="form-control" th:field="*{availability}" placeholder="Tue-Sat 9am-6pm">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Address</label>
                                <input type="text" class="form-control" th:field="*{address}">
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">Register Doctor</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
