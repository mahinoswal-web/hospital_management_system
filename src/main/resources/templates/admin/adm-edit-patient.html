<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        #sidebar { min-height: 100vh; background: linear-gradient(180deg, #111827 0%, #1f2937 100%); color: white; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 1000; }
        #sidebar .nav-link { color: rgba(255,255,255,0.7); margin-bottom: 8px; border-radius: 8px; transition: all 0.3s ease; font-weight: 500; }
        #sidebar .nav-link:hover, #sidebar .nav-link.active { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; transform: translateX(5px); border-left: 4px solid #3b82f6; }
        .fade-in-section { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: #ffffff; border: none; box-shadow: 0 8px 30px rgba(0,0,0,0.05); border-radius: 16px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="d-flex flex-column p-4" id="sidebar" style="width: 280px; position: fixed; height: 100vh;">
            <a href="/admin/dashboard" class="d-flex align-items-center mb-4 text-white text-decoration-none">
                <div class="bg-primary bg-gradient rounded p-2 me-3 shadow-sm">
                    <i class="bi bi-shield-lock-fill fs-4 text-white"></i>
                </div>
                <span class="fs-4 fw-bold tracking-wide">AdminHQ</span>
            </a>
            <hr class="text-white-50 opacity-25">
            <p class="text-uppercase text-white-50 small fw-bold mb-2 px-3 mt-3">Hospital Management</p>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/admin/dashboard" class="nav-link px-3 py-2"><i class="bi bi-speedometer2 me-2"></i> Global Dashboard</a></li>
                <li><a href="/admin/doctors" class="nav-link px-3 py-2"><i class="bi bi-person-badge me-2"></i> Manage Doctors</a></li>
                <li><a href="/admin/patients" class="nav-link active px-3 py-2"><i class="bi bi-people me-2"></i> Global Patient Registry</a></li>
            </ul>
            <div class="mt-auto">
                <a href="/login?logout=true" class="btn btn-outline-danger w-100 rounded-pill fw-bold mt-2 border-0 bg-danger bg-opacity-10 text-danger shadow-none">
                    <i class="bi bi-power me-2"></i> Terminate Session
                </a>
            </div>
        </div>

        <div class="flex-grow-1 fade-in-section p-4 p-md-5" style="margin-left: 280px;">
            <div class="mb-4">
                <a href="/admin/patients" class="text-decoration-none text-muted fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Back to Patient Registry
                </a>
            </div>

            <div class="card glass-card border-top border-primary border-4 p-4 p-md-5 mx-auto" style="max-width: 900px;">
                <h3 class="fw-bold text-dark mb-4"><i class="bi bi-pencil-square text-primary me-2"></i> Edit Patient Record</h3>
                
                <form action="/admin/update-patient" method="POST" th:object="${patient}">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{password}">
                    
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Patient ID</label>
                            <input type="text" class="form-control bg-light" th:field="*{patientId}" readonly>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold small text-muted text-uppercase">Full Name</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Date of Birth</label>
                            <input type="date" class="form-control" th:field="*{dateOfBirth}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Gender</label>
                            <select class="form-select" th:field="*{gender}">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Blood Group</label>
                            <input type="text" class="form-control" th:field="*{bloodGroup}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted text-uppercase">Phone Number</label>
                            <input type="text" class="form-control" th:field="*{phone}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted text-uppercase">Email Address</label>
                            <input type="email" class="form-control" th:field="*{emailAddress}">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold small text-muted text-uppercase">Residential Address</label>
                            <input type="text" class="form-control" th:field="*{residentialAddress}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted text-uppercase">Emergency Contact</label>
                            <input type="text" class="form-control" th:field="*{emergencyContact}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted text-uppercase">Current Condition</label>
                            <select class="form-select" th:field="*{condition}">
                                <option value="Stable">Stable</option>
                                <option value="Observation">Observation</option>
                                <option value="Critical">Critical</option>
                                <option value="Recovering">Recovering</option>
                            </select>
                        </div>

                        <div class="col-12 mt-5">
                            <button type="submit" class="btn btn-primary rounded-pill w-100 fw-bold py-2 shadow-sm fs-5">Save Patient Updates</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
